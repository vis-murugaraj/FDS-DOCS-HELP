<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.short_name }} Docs{% endblock %} | {{ site.domain }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <a class="skip-link" href="#main">Skip to main content</a>

    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="{{ url_for('home') }}">
                <span class="brand-mark">FDS</span>
                <span class="brand-text">
                    <span class="brand-name">{{ site.short_name }}</span>
                    <span class="brand-sub">Documentation</span>
                </span>
            </a>

            <nav class="site-nav" aria-label="Main navigation">
                <ul>
                    {% for item in nav_items %}
                        <li>
                            <a href="{{ url_for(item.endpoint) }}"
                               class="{% if request.endpoint == item.endpoint %}active{% endif %}">
                                {{ item.label }}
                            </a>
                        </li>
                    {% endfor %}
                </ul>
            </nav>
        </div>
    </header>

    <main id="main" class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>&copy; {{ site.year }} {{ site.company }}. Draft documentation portal.</p>
            <p class="muted">{{ site.domain }}</p>
        </div>
    </footer>
</body>
</html>
